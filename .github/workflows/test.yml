name: test
on:
  push:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
      - .github/workflows
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
      - .github/workflows
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim-version:
          - 'stable'
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y \
          cmake \
          build-essential \
          libboost-dev \
          libpcre3-dev \
          ragel \
          liblzma-dev \
          zlib1g-dev

      - name: Clone Hyperscan
        run: |
          git clone git://github.com/intel/hyperscan
          cd hyperscan
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo make install

      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nimble install -Y
      - run: nimble test
